<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ffffff">
  <title>예산 디펜스 RPG</title>
  <style>
    /* 🎨 CSS: 카툰/네오브루탈리즘 테마 */
    :root {
      --bg-color: #fdfaf6;
      --black: #111;
      --point-yellow: #ffcc00;
      --point-blue: #40a9ff;
      --point-red: #ff4d4f;
      --point-green: #52c41a;
      --border-thick: 2px solid var(--black);
      --box-shadow: 3px 3px 0px var(--black);
    }
    * {
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }
    #app {
      user-select: none;
      -webkit-user-select: none;
    }
    body {
      margin: 0; padding: 0;
      background-color: #ffffff; 
      color: var(--black);
      font-family: 'Pretendard', 'Arial', sans-serif;
      display: flex; justify-content: center;
      height: 100dvh; overflow: hidden;
    }
    #app {
      width: 100%; max-width: 450px; 
      height: 100dvh;
      display: flex; flex-direction: column; position: relative;
      background-color: var(--bg-color);
      border-left: var(--border-thick); border-right: var(--border-thick);
      box-sizing: border-box;
    }

    .cartoon-btn {
      background-color: #fff; border: var(--border-thick); font-weight: bold;
      border-radius: 12px;
      box-shadow: var(--box-shadow); cursor: pointer; transition: all 0.1s; color: var(--black);
    }
    .cartoon-btn:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0px var(--black); }

    .header { padding: 8px 12px; border-bottom: var(--border-thick); background: #fff; z-index: 10; flex-shrink: 0; }
    .top-menu { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .top-menu button { padding: 4px 8px; font-size: 11px; background: #fff; }
    .mana-title { font-size: 11px; font-weight: bold; text-align: center; color: #555; }
    .mana-amount { font-size: 26px; font-weight: 900; text-align: center; margin: 0 0 3px 0; letter-spacing: -1px; color: var(--point-blue); text-shadow: 1px 1px 0 #000; }
    .progress-bg { width: 100%; height: 14px; background-color: #eee; border: var(--border-thick); box-shadow: 2px 2px 0 var(--black); border-radius: 12px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--point-yellow); width: 0%; transition: width 0.3s; border-right: var(--border-thick); }

    /* 메인 보스 & 드롭다운 리스트 스타일 */
    .main-boss-area { padding: 8px 12px; flex-shrink: 0; z-index: 30; background: var(--bg-color); border-bottom: 2px dashed var(--black); }
    .main-boss-card { 
      padding: 8px 12px; background-color: var(--point-red); color: white; display: flex; justify-content: space-between; 
      align-items: center; border: var(--border-thick); box-shadow: var(--box-shadow); border-radius: 12px; position: relative; z-index: 2;
    }
    .main-boss-card h3 { margin: 0 0 3px 0; font-size: 16px; font-weight: 900; text-shadow: 1px 1px 0 var(--black); font-family: "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif; }
    .main-boss-card p { margin: 0; font-size: 11px; font-weight: bold; }
    .main-boss-dday { font-size: 18px; font-weight: 900; text-shadow: 1px 1px 0 var(--black); }

    /* ✨ 일정 리스트 드롭다운 디자인 */
    .boss-list-wrapper { margin: 0 8px; position: relative; z-index: 1; }
    .boss-list-content {
      background: #fff; max-height: 0; overflow-y: auto; transition: max-height 0.3s ease, padding 0.3s ease;
      border-radius: 0 0 12px 12px; margin-top: -10px; padding: 0 12px;
    }
    .boss-list-content.open {
      max-height: 250px; padding: 20px 12px 10px 12px; border: var(--border-thick); border-top: none; box-shadow: 3px 3px 0px var(--black);
    }
    .boss-list-content::-webkit-scrollbar { width: 4px; }
    .boss-list-content::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
    
    .boss-list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px dashed #ccc; }
    .boss-list-item:last-child { border-bottom: none; }
    .boss-info-col { flex: 1; display: flex; flex-direction: column; gap: 3px; cursor: pointer; }
    .boss-info-row { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: bold; }
    .boss-date-text { font-size: 11px; color: var(--point-blue); font-weight: bold;}
    .boss-action-col { display: flex; align-items: center; gap: 8px; }
    .boss-hp-text { font-size: 13px; font-weight: 900; }
    .boss-delete-btn { color: #aaa; background: none; border: none; font-size: 16px; cursor: pointer; padding: 5px; transition: 0.2s; }
    .boss-delete-btn:active { color: var(--point-red); transform: scale(0.9); }

    .map-container { flex: 1; position: relative; background-color: #66ab5e; background-image: radial-gradient(#ccc 1px, transparent 1px); background-size: 20px 20px; overflow: hidden; cursor: pointer; z-index: 10;}
    .map-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
    
    .summon-btn { position: absolute; bottom: 12px; left: 12px; z-index: 20; padding: 6px 10px; font-size: 13px; background: #fff; border: var(--border-thick); box-shadow: var(--box-shadow); border-radius: 12px; font-weight: bold; cursor: pointer; color: var(--point-blue); }
    .summon-btn:active { transform: translate(3px,3px); box-shadow: 0 0 0 var(--black); }

    @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-5px); } }
    @keyframes floatHero { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-7px); } }

    .emoji-img { object-fit: contain; filter: drop-shadow(2px 2px 0px var(--black)); transition: all 0.1s; }

    .hero-node {
      position: absolute; z-index: 100; display: flex; align-items: center; justify-content: center;
      margin-left: -30px; margin-top: -35px; animation: floatHero 2s ease-in-out infinite;
      pointer-events: auto; cursor: pointer;
    }
    .hero-node .speech-bubble { bottom: auto; top: 85%; }
    .hero-node .speech-bubble::after { top: auto; bottom: 100%; border-color: transparent transparent var(--black) transparent; }

    .hero-emoji { width: 55px; height: 55px; filter: drop-shadow(3px 3px 0px var(--black)); }
    .hero-weapon { width: 30px !important; height: 30px !important; position: absolute; right: -15px; bottom: 5px; z-index: -1; transform: scale(-1, -1) rotate(10deg) !important; filter: drop-shadow(-2px -2px 0px var(--black)) !important; animation: none !important; }

    .map-node { position: absolute; margin-left: -20px; margin-top: -20px; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 10; transition: transform 0.1s; font-size: 40px; }
    .node-emoji { width: 45px; height: 45px; animation: float 2.5s ease-in-out infinite; }
    .map-node:nth-child(even) .node-emoji { animation-delay: -0.7s; }
    .map-node:nth-child(3n) .node-emoji { animation-delay: -1.4s; }
    .map-node:active { transform: scale(0.9); }
    .map-node.active { z-index: 50; }

    .boss-card-emoji { width: 22px; height: 22px; vertical-align: middle; margin-right: 5px; filter: drop-shadow(1px 1px 0 var(--black)); }

    .speech-bubble {
      position: absolute; bottom: 85%; left: 50%; transform: translateX(-50%);
      background: #fff; border: var(--border-thick); padding: 5px 10px; border-radius: 8px;
      font-family: 'Pretendard', 'Arial', sans-serif; font-size: 11px; font-weight: bold; white-space: nowrap; color: var(--black);
      box-shadow: 2px 2px 0 var(--black); display: none; z-index: 60; text-align: center; pointer-events: none; 
    }
    .speech-bubble::after { content: ''; position: absolute; top: 100%; left: 50%; margin-left: -4px; border-width: 4px; border-style: solid; border-color: var(--black) transparent transparent transparent; }
    .speech-bubble.flip-down { bottom: auto; top: 80%; }
    .speech-bubble.flip-down::after { top: auto; bottom: 100%; border-color: transparent transparent var(--black) transparent; }
    .map-node.active .speech-bubble { display: block; }

    .input-area { padding: 12px; background: #fff; border-top: var(--border-thick); display: flex; flex-direction: column; gap: 8px; z-index: 20; flex-shrink: 0; border-radius: 12px 12px 0 0; margin-top: -10px; }
    .input-area input { padding: 10px; font-size: 14px; font-weight: bold; border: var(--border-thick); border-radius: 8px; box-shadow: inset 2px 2px 0 rgba(0,0,0,0.05); width: 100%; box-sizing: border-box; }
    .input-row { display: flex; gap: 8px; }
    #expenseAmount { text-align: right; }
    .attack-btn { flex: 0 0 90px; background-color: var(--point-red); color: white; font-size: 16px; border-radius: 8px; }

    .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 900; display: none; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
    .modal-content { background: var(--bg-color); width: 100%; max-height: 85vh; border: var(--border-thick); box-shadow: var(--box-shadow); padding: 15px; border-radius: 16px; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 2px solid var(--black); padding-bottom: 10px; }
    .modal-header h2 { margin: 0; font-size: 18px; font-weight: 900; }
    .modal-close { background: none; border: none; font-size: 20px; font-weight: bold; cursor: pointer; color: var(--black); }
    
    .form-group { margin-bottom: 12px; display: flex; flex-direction: column; gap: 5px;}
    .form-group label { font-size: 13px; font-weight: bold; }
    .form-group input { padding: 8px; border: var(--border-thick); border-radius: 8px; font-weight: bold; font-family: inherit;}
    .save-btn { width: 100%; padding: 10px; background-color: var(--point-blue); color: white; font-size: 15px; margin-top: 10px; border-radius: 8px; }

    .log-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .tab-btn { flex: 1; padding: 8px; text-align: center; border-radius: 8px; font-size: 13px; }
    .tab-btn.active { background: var(--point-yellow); }
    .log-list { list-style: none; padding: 0; margin: 0; border-top: 2px solid var(--black); }
    .log-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #ccc; font-weight: bold; font-size: 13px; }
    .cal-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 16px; margin-bottom: 8px; }
    .cal-nav-btn { background: #fff; border: var(--border-thick); padding: 4px 8px; font-weight: bold; border-radius: 8px; cursor: pointer; box-shadow: 2px 2px 0 var(--black); }
    .cal-nav-btn:active { transform: translate(2px,2px); box-shadow: 0 0 0 var(--black); }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; border: var(--border-thick); border-radius: 8px; padding: 4px; background: #fff; }
    .cal-day-name { text-align: center; font-size: 11px; font-weight: bold; padding: 4px 0; border-bottom: 2px solid var(--black); }
    .day-cell { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; border: 1px solid var(--black); border-radius: 4px; position: relative; }
    .day-cell.empty { background: transparent; border: none; }
    .damage-0 { background-color: #fff; } .damage-1 { background-color: #ffccc7; } .damage-2 { background-color: #ff7875; color: white;} .damage-3 { background-color: #f5222d; color: white; } .damage-4 { background-color: #820014; color: white; }

    #customAlert { z-index: 9999; }
    .alert-box { text-align: center; padding: 15px; max-width: 250px; margin: 0 auto; border-radius: 16px; }
    .alert-msg { font-size: 14px; font-weight: bold; margin-bottom: 15px; word-break: keep-all; line-height: 1.4; }

    #loadingOverlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; display:none; justify-content:center; align-items:center; color:white; font-size:18px; font-weight:bold; flex-direction:column; }
  </style>
</head>
<body>

  <div id="app">
    <div id="loadingOverlay">
      <div>데이터 동기화 중... ⏳</div>
      <div style="font-size:12px; margin-top:10px; color:#aaa;">(서버와 통신하고 있습니다)</div>
    </div>

    <div class="header">
      <div class="top-menu">
        <button class="cartoon-btn" onclick="openModal('logModal')">📜 기록</button>
        <button class="cartoon-btn" onclick="openModal('settingsModal')">⚙️ 설정</button>
      </div>
      <div class="mana-title">현재 보유 예산 (마나)</div>
      <div class="mana-amount" id="manaDisplay">0 원</div>
      <div class="progress-bg"><div class="progress-bar" id="manaBar"></div></div>
    </div>

    <div class="main-boss-area" id="mainBossArea"></div>

    <div class="map-container">
      <button class="summon-btn cartoon-btn" onclick="openModal('summonModal')">소환!</button>
      <svg class="map-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
        <path id="mapPath" d="" fill="none" stroke="#fae9a5" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="30, 25" vector-effect="non-scaling-stroke" />
      </svg>
      <div id="mapNodesContainer"></div>
    </div>

    <div class="input-area">
      <input type="text" id="expenseMemo" placeholder="지출 내용 (메모)">
      <div class="input-row">
        <input type="number" id="expenseAmount" placeholder="차감 금액">
        <button class="cartoon-btn attack-btn" onclick="attackBoss()">공격!</button>
      </div>
    </div>

    <div id="summonModal" class="modal-overlay">
      <div class="modal-content cartoon-btn" style="cursor: default;">
        <div class="modal-header">
          <h2>😈 몬스터 소환</h2>
          <button class="modal-close" onclick="closeModal('summonModal')">×</button>
        </div>
        <div class="form-group">
          <label>이벤트 이름</label>
          <input type="text" id="newBossName" placeholder="일정 이름을 적어주세요">
        </div>
        <div class="form-group">
          <label>예상 필요 금액 (HP)</label>
          <input type="number" id="newBossHp" placeholder="얼마가 필요할까요?">
        </div>
        <div class="form-group">
          <label>출현 날짜 (D-Day)</label>
          <input type="date" id="newBossDate">
        </div>
        <button class="cartoon-btn save-btn" style="background-color: var(--point-red);" onclick="addBoss()">소환하기 ⚡</button>
      </div>
    </div>

    <div id="editBossModal" class="modal-overlay">
      <div class="modal-content cartoon-btn" style="cursor: default;">
        <div class="modal-header">
          <h2>🛠️ 몬스터 정보 수정</h2>
          <button class="modal-close" onclick="closeModal('editBossModal')">×</button>
        </div>
        <input type="hidden" id="editBossId">
        <div class="form-group">
          <label>이벤트 이름 <span style="font-size:10px; color:#666;">(몬스터 종족명은 유지됩니다)</span></label>
          <input type="text" id="editBossName" placeholder="일정 이름을 수정하세요">
        </div>
        <div class="form-group">
          <label>필요 금액 (HP)</label>
          <input type="number" id="editBossHp">
        </div>
        <div class="form-group">
          <label>출현 날짜 (D-Day)</label>
          <input type="date" id="editBossDate">
        </div>
        <button class="cartoon-btn save-btn" onclick="saveEditBoss()">수정 완료 ✨</button>
      </div>
    </div>

    <div id="settingsModal" class="modal-overlay">
      <div class="modal-content cartoon-btn" style="cursor: default;">
        <div class="modal-header">
          <h2>⚙️ 설정</h2>
          <button class="modal-close" onclick="closeModal('settingsModal')">×</button>
        </div>
        <div class="form-group">
          <label>💰 현재 예산 덮어쓰기</label>
          <input type="number" id="setEditMana">
        </div>
        <hr style="border: 1px dashed var(--black); margin: 15px 0;">
        <div class="form-group">
          <label>📅 매월 초기화 날짜</label>
          <input type="number" id="setResetDay" min="1" max="31">
        </div>
        <div class="form-group">
          <label>💎 기본 지급 금액</label>
          <input type="number" id="setBaseMana">
        </div>
        <div class="form-group">
          <label>✨ 매일 자동 충전 예산</label>
          <input type="number" id="setDailyMana">
        </div>
        <button class="cartoon-btn save-btn" onclick="saveSettings()">설정 적용</button>
      </div>
    </div>

    <div id="logModal" class="modal-overlay">
      <div class="modal-content cartoon-btn" style="cursor: default;">
        <div class="modal-header">
          <h2>📜 전투 기록</h2>
          <button class="modal-close" onclick="closeModal('logModal')">×</button>
        </div>
        <div class="log-tabs">
          <button class="cartoon-btn tab-btn active" id="tabList" onclick="switchLogTab('list')">리스트</button>
          <button class="cartoon-btn tab-btn" id="tabGrid" onclick="switchLogTab('grid')">달력</button>
        </div>
        <ul id="logListView" class="log-list"></ul>
        <div id="logGridView" style="display: none;">
          <div class="cal-header">
            <button class="cal-nav-btn" onclick="changeMonth(-1)">◀</button>
            <span id="calMonthDisplay"></span>
            <button class="cal-nav-btn" onclick="changeMonth(1)">▶</button>
          </div>
          <div class="calendar-grid" id="calendarGrid">
            <div class="cal-day-name" style="color:var(--point-red);">일</div><div class="cal-day-name">월</div><div class="cal-day-name">화</div><div class="cal-day-name">수</div><div class="cal-day-name">목</div><div class="cal-day-name">금</div><div class="cal-day-name" style="color:var(--point-blue);">토</div>
          </div>
        </div>
      </div>
    </div>

    <div id="customAlert" class="modal-overlay">
      <div class="modal-content cartoon-btn alert-box" style="cursor: default;">
        <div class="alert-msg" id="alertMessage">메시지</div>
        <button class="cartoon-btn" style="padding: 8px 30px; background: var(--point-yellow); border-radius: 8px;" onclick="closeModal('customAlert')">확인</button>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzEq8GmgpYUbqcgPmigVcgoCFcdqEPY_NaDjYe08wkUU1yPn1iRyQoEat2_FTMqtRNm/exec";

    let state = {
      currentMana: 0, lastLoginDate: getTodayDateString(), lastResetMonth: getMonthString(),
      settings: { resetDay: 1, baseMana: 0, dailyMana: 15000 },
      bosses: [], logs: []
    };

    let currentCalDate = new Date(); 

    const mapCoordinates = [
      { x: 10, y: 10 }, { x: 90, y: 10 }, { x: 90, y: 30 }, { x: 50, y: 30 }, 
      { x: 50, y: 50 }, { x: 75, y: 50 }, { x: 75, y: 70 }, { x: 30, y: 70 }, 
      { x: 30, y: 30 }, { x: 10, y: 30 }, { x: 10, y: 90 }, { x: 90, y: 90 }  
    ];

    const MS_EMOJI_BASE = "https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@latest/assets/";
    
    const monsterDic = [
      { name: "유령", emoji: "👻", img: "Ghost/3D/ghost_3d.png" }, { name: "외계인", emoji: "👾", img: "Alien%20monster/3D/alien_monster_3d.png" }, 
      { name: "로봇", emoji: "🤖", img: "Robot/3D/robot_3d.png" }, { name: "피자", emoji: "🍕", img: "Pizza/3D/pizza_3d.png" }, 
      { name: "케이크", emoji: "🍰", img: "Shortcake/3D/shortcake_3d.png" }, { name: "늑대", emoji: "🐺", img: "Wolf/3D/wolf_3d.png" },
      { name: "악어", emoji: "🐊", img: "Crocodile/3D/crocodile_3d.png" }, { name: "해파리", emoji: "🪼", img: "Jellyfish/3D/jellyfish_3d.png" }, 
      { name: "잭오랜턴", emoji: "🎃", img: "Jack-o-lantern/3D/jack-o-lantern_3d.png" }, { name: "마왕", emoji: "👑", img: "Crown/3D/crown_3d.png" }, 
      { name: "골렘", emoji: "🪨", img: "Rock/3D/rock_3d.png" }, { name: "아보카도", emoji: "🥑", img: "Avocado/3D/avocado_3d.png" },
      { name: "단검", emoji: "🗡️", img: "Dagger/3D/dagger_3d.png" }, { name: "피냐타", emoji: "🪅", img: "Piñata/3D/piñata_3d.png" },
      { name: "타코", emoji: "🌮", img: "Taco/3D/taco_3d.png" }, { name: "주먹밥", emoji: "🍙", img: "Rice%20ball/3D/rice_ball_3d.png" },
      { name: "선인장", emoji: "🌵", img: "Cactus/3D/cactus_3d.png" }, { name: "눈사람", emoji: "⛄", img: "Snowman%20without%20snow/3D/snowman_without_snow_3d.png" }
    ];

    const heroQuotes = [
      "살까 말까 할 때는 사지 마라냥.", "지금 사는 그 물건 정말 필요한 거냐냥?", "지름신은 용사의 최대 적이다냥.", "영수증은 배신의 증거다냥.", "과소비는 보스보다 무섭다냥.",

    function getEmojiImage(emojiStr, type = "node") {
      const found = monsterDic.find(m => m.emoji === emojiStr);
      let imgPath = found ? found.img : null;
      if (!imgPath && emojiStr === "😺") imgPath = "Grinning%20cat/3D/grinning_cat_3d.png"; 
      if (imgPath) {
        let className = "emoji-img";
        if (type === "boss") className += " boss-card-emoji";
        else if (type === "weapon") className += " hero-weapon";
        else if (emojiStr === "😺") className += " hero-emoji";
        else className += " node-emoji monster-emoji";
        return `<img src="${MS_EMOJI_BASE}${imgPath}" class="${className}" alt="${emojiStr}" onerror="this.outerHTML='${emojiStr}'">`;
      }
      return emojiStr; 
    }

    function getTodayDateString() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
    function getMonthString() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
    function showLoading() { document.getElementById('loadingOverlay').style.display = 'flex'; }
    function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }
    function showAlert(msg) { document.getElementById('alertMessage').innerHTML = msg; document.getElementById('customAlert').style.display = 'flex'; }

    function parseDateToNoon(dStr) {
      if (!dStr) return new Date();
      const cleanDate = String(dStr).substring(0, 10);
      const p = cleanDate.split('-');
      return new Date(p[0], p[1]-1, p[2], 12, 0, 0);
    }

    // ✨ 일정 이름에서 몬스터 종족명 분리 (수정할 때 사용)
    function extractEventName(fullName, emoji) {
      const found = monsterDic.find(m => m.emoji === emoji);
      if(found && fullName.endsWith(" " + found.name)) {
        return fullName.substring(0, fullName.length - found.name.length - 1);
      }
      return fullName; 
    }

    function toggleBossList() {
      const content = document.getElementById('bossListContent');
      if(content) content.classList.toggle('open');
    }

    function render() {
      document.getElementById('manaDisplay').innerText = `${state.currentMana.toLocaleString()} 원`;
      if(!state.bosses) state.bosses = [];
      state.bosses.sort((a, b) => new Date(a.targetDate) - new Date(b.targetDate));
      
      const mainBossArea = document.getElementById('mainBossArea');
      const mapNodesContainer = document.getElementById('mapNodesContainer');
      const mapPath = document.getElementById('mapPath');
      mapNodesContainer.innerHTML = '';
      
      if (state.bosses.length === 0) {
        mainBossArea.innerHTML = `<div style="text-align:center; font-weight:bold; padding:10px;">평화롭습니다. 보스가 없어요! 🕊️</div>`;
        document.getElementById('manaBar').style.width = '100%';
        mapPath.setAttribute('d', ''); return;
      }

      const mainBoss = state.bosses[0];
      let percent = (state.currentMana / mainBoss.hp) * 100;
      document.getElementById('manaBar').style.width = `${Math.min(percent, 100)}%`;

      // ✨ 상단 영역: 메인 카드 + 숨겨진 드롭다운 리스트 HTML
      let listHtml = state.bosses.map(b => `
        <div class="boss-list-item">
          <div class="boss-info-col" onclick="openEditModal(${b.id})">
            <div class="boss-info-row">
              ${getEmojiImage(b.emoji, "boss")} 
              <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width: 140px;">${b.name}</span>
            </div>
            <div class="boss-date-text">${b.targetDate} (${calculateDday(b.targetDate)})</div>
          </div>
          <div class="boss-action-col">
            <span class="boss-hp-text">${b.hp.toLocaleString()}원</span>
            <button class="boss-delete-btn" onclick="deleteBoss(${b.id}, event)">✖</button>
          </div>
        </div>
      `).join('');

      mainBossArea.innerHTML = `
        <div style="position: relative; z-index: 20;">
          <div class="main-boss-card" onclick="toggleBossList()" style="cursor: pointer;">
            <div>
              <h3 style="display:flex; align-items:center;">
                ${getEmojiImage(mainBoss.emoji, "boss")} ${mainBoss.name}
              </h3>
              <p>필요 예산: ${mainBoss.hp.toLocaleString()} 원</p>
            </div>
            <div style="text-align:right;">
              <div class="main-boss-dday">${calculateDday(mainBoss.targetDate)}</div>
              <div style="font-size: 10px; color: rgba(255,255,255,0.9); margin-top:2px; font-weight:normal;">전체일정 ▼</div>
            </div>
          </div>
          <div class="boss-list-wrapper">
            <div class="boss-list-content" id="bossListContent">
              ${listHtml}
            </div>
          </div>
        </div>
      `;

      let pathD = `M ${mapCoordinates[0].x} ${mapCoordinates[0].y} `;
      
      mapNodesContainer.innerHTML += `
        <div class="hero-node" style="left: ${mapCoordinates[0].x}%; top: ${mapCoordinates[0].y}%;" onclick="toggleHeroBubble(this, event)">
          ${getEmojiImage("😺")}
          ${getEmojiImage("🗡️", "weapon")}
          <div class="speech-bubble"></div> 
        </div>`;

      for(let i=1; i < mapCoordinates.length; i++) { 
        pathD += `L ${mapCoordinates[i].x} ${mapCoordinates[i].y} `; 
      }
      mapPath.setAttribute('d', pathD.trim());

      let segments = [];
      let totalPathLength = 0;
      for (let i = 0; i < mapCoordinates.length - 1; i++) {
        let p1 = mapCoordinates[i], p2 = mapCoordinates[i+1];
        let dx = p2.x - p1.x, dy = p2.y - p1.y;
        let dist = Math.sqrt(dx * dx + dy * dy);
        segments.push({ p1, p2, dist, cumDist: totalPathLength });
        totalPathLength += dist;
      }

      const todayObj = parseDateToNoon(getTodayDateString());
      const allBosses = state.bosses;
      const HORIZON_DAYS = 30; 
      const maxScaledHorizon = Math.pow(HORIZON_DAYS, 0.85); 
      const assignedRatios = []; 

      allBosses.forEach((boss) => {
        const targetObj = parseDateToNoon(boss.targetDate);
        let diffDays = Math.max(0, Math.round((targetObj - todayObj) / 86400000));
        let scaledDays = Math.pow(diffDays, 0.85); 
        let ratio = Math.min(1, scaledDays / maxScaledHorizon);
        
        let conflictCount = assignedRatios.filter(r => Math.abs(r - ratio) < 0.035).length;
        if (conflictCount > 0) {
          ratio += (conflictCount * 0.035);
          if(ratio > 1) ratio = 1;
        }
        assignedRatios.push(ratio);

        let targetDist = totalPathLength * (0.03 + (ratio * 0.97));
        let posX = mapCoordinates[mapCoordinates.length - 1].x;
        let posY = mapCoordinates[mapCoordinates.length - 1].y;

        for (let seg of segments) {
          if (targetDist >= seg.cumDist && targetDist <= seg.cumDist + seg.dist) {
            let t = (targetDist - seg.cumDist) / seg.dist;
            posX = seg.p1.x + t * (seg.p2.x - seg.p1.x);
            posY = seg.p1.y + t * (seg.p2.y - seg.p1.y);
            break;
          }
        }

        mapNodesContainer.innerHTML += `
          <div class="map-node" style="left: ${posX}%; top: ${posY}%;" onclick="toggleBubble(this, event)">
            <div class="node-emoji">${getEmojiImage(boss.emoji)}</div>
            <div class="speech-bubble">${boss.name}<br>${calculateDday(boss.targetDate)} | ${boss.hp.toLocaleString()}원</div>
          </div>`;
      });
    }

    function closeAllBubbles() {
      document.querySelectorAll('.map-node, .hero-node').forEach(n => {
        n.classList.remove('active');
        const b = n.querySelector('.speech-bubble');
        if(b) {
          b.style.display = 'none'; 
          b.style.left = '50%'; 
          b.style.right = 'auto';
          b.style.transform = 'translateX(-50%)';
          b.classList.remove('flip-down');
        }
      });
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.map-node') && !e.target.closest('.hero-node')) {
        closeAllBubbles();
      }
    });

    // ✨ 용사 말풍선 강제 갱신 및 화면 밖 벗어남 방지 (Absolute Left/Right 적용)
    function toggleHeroBubble(element, event) {
      event.stopPropagation();
      const randomQuote = heroQuotes[Math.floor(Math.random() * heroQuotes.length)];
      const bubble = element.querySelector('.speech-bubble');
      
      closeAllBubbles(); 
      element.classList.add('active');
      bubble.style.display = 'block';
      bubble.innerText = randomQuote;
      
      bubble.style.left = '50%'; 
      bubble.style.right = 'auto';
      bubble.style.transform = 'translateX(-50%)';
      
      setTimeout(() => {
        const rect = bubble.getBoundingClientRect();
        const mapRect = document.querySelector('.map-container').getBoundingClientRect();
        // 화면 가장자리를 넘어가면 transform을 풀고 절대 여백(10px) 부여
        if (rect.left < mapRect.left + 10) {
          bubble.style.left = '10px'; 
          bubble.style.transform = 'none';
        } 
        else if (rect.right > mapRect.right - 10) {
          bubble.style.left = 'auto'; 
          bubble.style.right = '10px'; 
          bubble.style.transform = 'none';
        }
      }, 10);
    }
    
    function toggleBubble(element, event) {
      event.stopPropagation(); 
      const isActive = element.classList.contains('active');
      closeAllBubbles();

      if(!isActive) {
        element.classList.add('active');
        const bubble = element.querySelector('.speech-bubble');
        bubble.style.display = 'block'; 
        
        setTimeout(() => {
          const rect = bubble.getBoundingClientRect();
          const mapRect = document.querySelector('.map-container').getBoundingClientRect();
          if (rect.left < mapRect.left + 10) {
            bubble.style.left = '10px'; 
            bubble.style.transform = 'none';
          } 
          else if (rect.right > mapRect.right - 10) {
            bubble.style.left = 'auto'; 
            bubble.style.right = '10px'; 
            bubble.style.transform = 'none';
          }
          if (rect.top < mapRect.top + 50) {
            bubble.classList.add('flip-down');
          }
        }, 10);
      }
    }

    function calculateDday(dateStr) {
      const target = parseDateToNoon(dateStr);
      const today = parseDateToNoon(getTodayDateString());
      const diff = Math.round((target - today) / 86400000);
      return diff === 0 ? "D-DAY" : (diff > 0 ? `D-${diff}` : `D+${Math.abs(diff)}`);
    }

    function saveState() {
      localStorage.setItem('rpg_defense_state', JSON.stringify(state)); 
      fetch(GAS_URL, {
        method: 'POST', redirect: 'follow', 
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(state)
      }).catch(err => { console.error("서버 데이터 동기화 에러"); });
    }

    function addBoss() {
      const nameInput = document.getElementById('newBossName').value.trim();
      const hpInput = parseInt(document.getElementById('newBossHp').value);
      const dateInput = document.getElementById('newBossDate').value;
      if (!nameInput || isNaN(hpInput) || hpInput <= 0 || !dateInput) { showAlert("정보를 정확히 입력해주세요! 🐛"); return; }

      if(!state.bosses) state.bosses = [];
      const usedEmojis = state.bosses.map(b => b.emoji);
      let availableMonsters = monsterDic.filter(m => !usedEmojis.includes(m.emoji) && m.emoji !== "🗡️");
      if (availableMonsters.length === 0) availableMonsters = monsterDic.filter(m => m.emoji !== "🗡️");

      const randomMonster = availableMonsters[Math.floor(Math.random() * availableMonsters.length)];
      const finalName = `${nameInput} ${randomMonster.name}`; 

      state.bosses.push({ id: Date.now(), name: finalName, hp: hpInput, targetDate: dateInput, emoji: randomMonster.emoji });
      
      document.getElementById('newBossName').value = ''; document.getElementById('newBossHp').value = ''; document.getElementById('newBossDate').value = '';
      render(); saveState(); closeModal('summonModal'); 
      showAlert(`새로운 몬스터 [${finalName}] 소환 완료! 😈`);
    }

    // ✨ 보스(일정) 수정 및 삭제 함수
    function openEditModal(id) {
      const boss = state.bosses.find(b => b.id === id);
      if(!boss) return;
      
      document.getElementById('editBossId').value = boss.id;
      document.getElementById('editBossName').value = extractEventName(boss.name, boss.emoji);
      document.getElementById('editBossHp').value = boss.hp;
      document.getElementById('editBossDate').value = boss.targetDate;
      
      openModal('editBossModal');
    }

    function saveEditBoss() {
      const id = parseInt(document.getElementById('editBossId').value);
      const newName = document.getElementById('editBossName').value.trim();
      const newHp = parseInt(document.getElementById('editBossHp').value);
      const newDate = document.getElementById('editBossDate').value;
      
      if (!newName || isNaN(newHp) || newHp <= 0 || !newDate) { showAlert("정보를 정확히 입력해주세요! 🐛"); return; }

      const bossIndex = state.bosses.findIndex(b => b.id === id);
      if(bossIndex > -1) {
        const boss = state.bosses[bossIndex];
        const monster = monsterDic.find(m => m.emoji === boss.emoji);
        const finalName = monster ? `${newName} ${monster.name}` : newName;
        
        state.bosses[bossIndex] = { ...boss, name: finalName, hp: newHp, targetDate: newDate };
        render(); saveState(); closeModal('editBossModal');
        showAlert("일정이 수정되었습니다! ✨");
      }
    }

    function deleteBoss(id, event) {
      event.stopPropagation(); // 모달이 안 열리게 막음
      if(confirm("정말 이 일정을 삭제하시겠습니까냥? 😿")) {
        state.bosses = state.bosses.filter(b => b.id !== id);
        render(); saveState();
        showAlert("일정이 성공적으로 삭제되었습니다! 🗑️");
      }
    }

    function attackBoss() {
      const amount = parseInt(document.getElementById('expenseAmount').value);
      const memo = document.getElementById('expenseMemo').value.trim() || "일반 공격";
      if (isNaN(amount) || amount <= 0) { showAlert("공격 금액을 똑바로 입력하시지!"); return; }

      state.currentMana -= amount;
      if(!state.logs) state.logs = [];
      state.logs.push({ date: getTodayDateString(), amount: amount, memo: memo });
      
      document.getElementById('expenseAmount').value = ''; document.getElementById('expenseMemo').value = '';
      render(); saveState(); 
      showAlert(`🗡️ ${amount.toLocaleString()} 데미지 적중!`);
    }

      document.getElementById(id).style.display = 'flex'; 
      if(id === 'settingsModal') {
        document.getElementById('setEditMana').value = state.currentMana;
        document.getElementById('setResetDay').value = state.settings.resetDay;
        document.getElementById('setBaseMana').value = state.settings.baseMana;
        document.getElementById('setDailyMana').value = state.settings.dailyMana;

    }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function saveSettings() {
      const newMana = parseInt(document.getElementById('setEditMana').value);
      if(!isNaN(newMana)) state.currentMana = newMana;
      state.settings.resetDay = parseInt(document.getElementById('setResetDay').value);
      state.settings.baseMana = parseInt(document.getElementById('setBaseMana').value);
      state.settings.dailyMana = parseInt(document.getElementById('setDailyMana').value);
      
      render(); saveState(); closeModal('settingsModal'); 
      showAlert("설정 저장 완료! ✨");
    }

    function switchLogTab(tab) {
      document.getElementById('tabList').classList.toggle('active', tab === 'list');
      document.getElementById('tabGrid').classList.toggle('active', tab === 'grid');
      document.getElementById('logListView').style.display = tab === 'list' ? 'block' : 'none';
      document.getElementById('logGridView').style.display = tab === 'grid' ? 'block' : 'none';
    }
    function renderLogs() {
      const list = document.getElementById('logListView'); list.innerHTML = '';
      if(!state.logs) state.logs = [];
      const sorted = [...state.logs].sort((a,b) => new Date(b.date) - new Date(a.date));
      if(!sorted.length) list.innerHTML = '<li class="log-item" style="justify-content:center;">기록이 없다!</li>';
      sorted.forEach(l => list.innerHTML += `<li class="log-item"><span>${l.date.slice(5)} | ${l.memo}</span><span style="color:var(--point-red);">-${l.amount.toLocaleString()}</span></li>`);
      switchLogTab('list');
    }
    function changeMonth(offset) { currentCalDate.setMonth(currentCalDate.getMonth() + offset); renderCalendar(); }
    function renderCalendar() {
      const y = currentCalDate.getFullYear(), m = currentCalDate.getMonth();
      document.getElementById('calMonthDisplay').innerText = `${y}. ${String(m+1).padStart(2,'0')}`;
      const grid = document.getElementById('calendarGrid');
      grid.querySelectorAll('.day-cell').forEach(e => e.remove());
      const dailyTotals = {};
      if(!state.logs) state.logs = [];
      state.logs.forEach(l => { 
        if(l.date) { 
          const [ly, lm, ld] = l.date.split('-'); 
          if (parseInt(ly) === y && parseInt(lm) === m + 1) dailyTotals[parseInt(ld)] = (dailyTotals[parseInt(ld)] || 0) + l.amount; 
        }
      });
      const fDay = new Date(y, m, 1).getDay(), dInM = new Date(y, m + 1, 0).getDate();
      for(let i=0; i<fDay; i++) grid.innerHTML += `<div class="day-cell empty"></div>`;
      for(let d=1; d<=dInM; d++) {
        let amt = dailyTotals[d] || 0, c = 'damage-0';
        if (amt>0 && amt<=10000) c='damage-1'; else if (amt>10000 && amt<=30000) c='damage-2'; else if (amt>30000 && amt<=60000) c='damage-3'; else if (amt>60000) c='damage-4';
        grid.innerHTML += `<div class="day-cell ${c}" title="${amt.toLocaleString()}원">${d}</div>`;
      }
    }

    function init() {
      if(!GAS_URL || GAS_URL.includes("여기에_고객님의_GAS_URL")) {
        showAlert("GAS URL이 설정되지 않았습니다! 코드에 URL을 넣어주세요.");
        render(); return;
      }
      
      const localData = localStorage.getItem('rpg_defense_state');
      let hasLocalData = false;
      if (localData) {
        state = JSON.parse(localData);
        hasLocalData = true;
        render(); 
      }
      
      if (!hasLocalData) showLoading(); 

      fetch(GAS_URL + "?t=" + new Date().getTime())
        .then(response => response.json())
        .then(serverState => {
          if(serverState) {
            const prevStateStr = JSON.stringify(state);
            state = serverState;
            localStorage.setItem('rpg_defense_state', JSON.stringify(state)); 
            
            if (state.syncMessages && state.syncMessages.length > 0) {
              showAlert(state.syncMessages.join("<br>"));
            }
            if (prevStateStr !== JSON.stringify(state) || !hasLocalData) {
              render(); 
            }
          }
          if (!hasLocalData) hideLoading();
        })
        .catch(err => {
          if (!hasLocalData) {
            hideLoading();
            showAlert("서버 통신 실패! 로컬 데이터로 접속됩니다. 🐛");
            render();
          }
        });
    }

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') init(); 
    });

    init();
  </script>
</body>
</html>
